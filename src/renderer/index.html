<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>GlanceShift</title>
    <!--
      CSP — WebGazer + TensorFlow.js 요구사항:
        · 'unsafe-eval'    : TFjs WASM/WebGL 백엔드
        · worker-src blob: : TFjs Worker (face landmark detection)
        · img-src blob:    : webcam frame
        · media-src blob:  : webcam stream
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data: blob:;
                   media-src 'self' blob: mediastream:;
                   connect-src 'self' blob: data:;
                   worker-src 'self' blob:;" />
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: transparent;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        user-select: none;
      }
      /* WebGazer는 비디오·페이스 메쉬 캔버스를 body에 직접 붙임. 보이지 않도록 강제. */
      #webgazerVideoContainer,
      #webgazerVideoFeed,
      #webgazerFaceOverlay,
      #webgazerFaceFeedbackBox,
      #webgazerGazeDot {
        display: none !important;
        visibility: hidden !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- WebGazer는 전역 window.webgazer 로 노출됨. defer로 DOMContentLoaded 직후 실행. -->
    <script src="./webgazer.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
